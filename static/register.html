<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 - WinGo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  background: #0d0d0d; color: #e5e5e5;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.card {
  width: 100%; max-width: 400px; padding: 40px;
  background: #141414; border: 1px solid #262626; border-radius: 16px;
}
.logo { font-size: 28px; font-weight: 700; margin-bottom: 8px; text-align: center; }
.subtitle { color: #888; text-align: center; margin-bottom: 32px; font-size: 14px; }
.input-group { margin-bottom: 16px; }
.input-group label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
.input-group input {
  width: 100%; padding: 12px 14px; background: #1a1a1a; border: 1px solid #333;
  border-radius: 8px; color: #e5e5e5; font-size: 14px; outline: none;
}
.input-group input:focus { border-color: #3b82f6; }
.btn {
  width: 100%; padding: 12px; background: #3b82f6; border: none; border-radius: 8px;
  color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.15s;
  margin-top: 8px;
}
.btn:hover { background: #60a5fa; }
.btn:disabled { background: #555; cursor: not-allowed; }
.footer { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
.footer a { color: #3b82f6; text-decoration: none; }
.error { color: #ef4444; font-size: 13px; margin-top: 8px; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚡ WinGo</div>
  <div class="subtitle">注册企业账号，开启 AI 开发</div>
  <form id="regForm">
    <div class="input-group">
      <label>企业名称</label>
      <input type="text" id="teamName" placeholder="例如： ABC科技有限公司" required>
    </div>
    <div class="input-group">
      <label>管理员邮箱</label>
      <input type="email" id="email" placeholder="admin@company.com" required>
    </div>
    <div class="input-group">
      <label>管理员姓名</label>
      <input type="text" id="name" placeholder="张三">
    </div>
    <div class="input-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="至少6位" required minlength="6">
    </div>
    <button type="submit" class="btn" id="submitBtn">注册</button>
    <div class="error" id="error"></div>
  </form>
  <div class="footer">
    已有账号？<a href="/login.html">立即登录</a>
  </div>
</div>
<script>
document.getElementById('regForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('error');
  btn.disabled = true; err.textContent = '';
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        team_name: document.getElementById('teamName').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        name: document.getElementById('name').value
      })
    });
    const data = await res.json();
    if (data.token) {
      localStorage.setItem('wingo_token', data.token);
      location.href = '/';
    } else {
      err.textContent = data.detail || '注册失败';
    }
  } catch (e) {
    err.textContent = '网络错误';
  }
  btn.disabled = false;
});
</script>
</body>
</html>
